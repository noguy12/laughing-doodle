<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Protected</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      background: #000;
      overflow: hidden;
    }
  </style>

  <script>
    if (window.top === window.self) {
      location.href = "about:blank";
    }

    window.onload = () => {
      const realURL = decodeURIComponent(location.hash.slice(1));

      if (!realURL) {
        location.href = "about:blank";
        return;
      }

      const iframe = document.createElement("iframe");
      iframe.src = realURL;
      iframe.allow = "fullscreen";
      iframe.allowFullscreen = true;
      iframe.style = "width:100%;height:100%;border:none;";
      document.body.appendChild(iframe);
    };
  </script>
</head>
<body></body>
</html>
